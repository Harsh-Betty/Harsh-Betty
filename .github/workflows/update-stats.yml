name: Update README Stats Cards

on:
  schedule:
    # Runs once daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: >-
            username=Harsh-Betty&show_icons=true&theme=great_gatsby&hide_border=true&include_all_commits=true&count_private=true&ring_color=f5b800&icon_color=fe8d41
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: top-langs
          options: >-
            username=Harsh-Betty&layout=compact&theme=great_gatsby&hide_border=true&langs_count=8&exclude_repo=Harsh-Betty
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update stats cards" || exit 0
          git push